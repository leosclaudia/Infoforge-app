<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Generador de Banners — Productividad con IA</title>
<style>
body { font-family: sans-serif; background: #0f0a1e; color: #e5e7eb; padding: 24px; max-width: 900px; margin: 0 auto; }
h1 { color: #a78bfa; font-size: 22px; margin-bottom: 6px; }
p { color: #9ca3af; font-size: 14px; margin-bottom: 20px; }
.banner-card { background: #1a1030; border: 1px solid #2d1f4e; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
.banner-label { font-weight: 700; font-size: 14px; color: #c4b5fd; margin-bottom: 4px; }
.banner-hint { font-size: 11px; color: #6b7280; margin-bottom: 12px; }
.banner-img { width: 100%; border-radius: 8px; max-height: 350px; object-fit: cover; display: block; }
.btn-dl { display: inline-block; margin-top: 10px; padding: 9px 20px; background: #7c3aed; color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; text-decoration: none; }
.btn-dl:hover { background: #6d28d9; }
.loading { text-align: center; padding: 30px; color: #6b7280; font-size: 13px; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
@media(max-width:600px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<h1>🎨 Banners con IA — Productividad con IA para el Trabajo Diario</h1>
<p>Hacé click en "Descargar" en cada banner para guardarlo en tu computadora. Todos son sin texto para que puedas agregarles tu logo en Canva.</p>

<div id="banner-container"></div>

<script>
const TOPIC = "Productividad con inteligencia artificial para el trabajo diario";
const STYLE = "professional person working with laptop and AI interface, modern office, warm natural light, no text no letters no words, photorealistic, high quality";

const banners = [
  { label: "🖼️ Banner Principal Hotmart", w: 1920, h: 640, hint: "Sección 'Banner' en Personalizar producto — 1920×640px (3:1)", file: "banner_principal_hotmart_1920x640" },
  { label: "🟦 Avatar Cuadrado Hotmart", w: 600, h: 600, hint: "Sección 'Avatar' en Personalizar producto — 600×600px", file: "avatar_hotmart_600x600" },
  { label: "📋 Portada Vitrina Hotmart", w: 600, h: 900, hint: "Sección 'Portadas para vitrina' — 600×900px", file: "portada_vitrina_600x900" },
  { label: "🔹 Banner Afiliados 250×250", w: 250, h: 250, hint: "Material afiliados Hotmart — 250×250px", file: "banner_afiliados_250x250" },
  { label: "🔹 Banner Afiliados 300×250", w: 300, h: 250, hint: "Material afiliados Hotmart — 300×250px", file: "banner_afiliados_300x250" },
  { label: "🔹 Banner Afiliados 336×280", w: 336, h: 280, hint: "Material afiliados Hotmart — 336×280px", file: "banner_afiliados_336x280" },
  { label: "🔹 Banner Afiliados 468×60", w: 468, h: 60, hint: "Material afiliados Hotmart — 468×60px", file: "banner_afiliados_468x60" },
  { label: "🔹 Banner Afiliados 728×90", w: 728, h: 90, hint: "Material afiliados Hotmart — 728×90px (leaderboard)", file: "banner_afiliados_728x90" },
  { label: "🔹 Banner Afiliados 160×600", w: 160, h: 600, hint: "Material afiliados Hotmart — 160×600px (skyscraper)", file: "banner_afiliados_160x600" },
  { label: "📱 Facebook/Meta Ads 1200×628", w: 1200, h: 628, hint: "Meta Ads / Facebook — 1200×628px", file: "meta_ads_1200x628" },
  { label: "📷 Instagram Post 1080×1080", w: 1080, h: 1080, hint: "Instagram cuadrado — 1080×1080px", file: "instagram_1080x1080" },
];

const container = document.getElementById('banner-container');

async function downloadBanner(url, filename, w, h, btn) {
  btn.textContent = '⏳ Descargando...';
  try {
    const img = new Image(); img.crossOrigin = 'anonymous';
    await new Promise((res, rej) => { img.onload=res; img.onerror=rej; img.src=url; setTimeout(rej,30000); });
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
    const link = document.createElement('a');
    link.download = filename + '.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
    btn.textContent = '✅ Descargado!';
    setTimeout(() => btn.textContent = '⬇️ Descargar ' + w + '×' + h, 3000);
  } catch(e) {
    window.open(url, '_blank');
    btn.textContent = '⬇️ Descargar ' + w + '×' + h;
  }
}

banners.forEach((b, i) => {
  const fw = Math.min(b.w < 100 ? 800 : b.w, 1280);
  const fh = b.h < 100 ? Math.max(64, Math.round(800*b.h/b.w)) : Math.min(b.h, 1280);
  const prompt = encodeURIComponent(STYLE + ', ' + (b.w > b.h ? 'wide horizontal' : b.w===b.h ? 'square' : 'vertical portrait') + ' composition');
  const url = `https://image.pollinations.ai/prompt/${prompt}?width=${fw}&height=${fh}&nologo=true&seed=${42000+i*77}&enhance=true`;

  const card = document.createElement('div');
  card.className = 'banner-card';
  card.innerHTML = `
    <div class="banner-label">${b.label}</div>
    <div class="banner-hint">${b.hint}</div>
    <div class="loading" id="loading-${i}">⏳ Cargando imagen...</div>
    <img src="${url}" class="banner-img" id="img-${i}" style="display:none" 
         onload="document.getElementById('loading-${i}').style.display='none';this.style.display='block'"
         onerror="document.getElementById('loading-${i}').textContent='⚠️ Error — intentá recargar la página'">
    <div><button class="btn-dl" onclick="downloadBanner('${url}','${b.file}',${b.w},${b.h},this)">⬇️ Descargar ${b.w}×${b.h}</button></div>
  `;
  container.appendChild(card);
});
</script>
</body>
</html>
